spring:
  application:
    name: ledgersaas-backend

  # Lokal gelistirmede kok dizindeki .env dosyasini otomatik yukler
  # (dosya yoksa sessizce atlanir; prod'da degiskenler ortamdan gelir)
  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
