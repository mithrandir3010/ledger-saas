version: '3.8'

services:
  postgresdb:
    image: postgres:15-alpine
    container_name: ledgersaas_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ledgersaas_pgdata:/var/lib/postgresql/data
    networks:
      - ledgersaas-network

volumes:
  ledgersaas_pgdata:

networks:
  ledgersaas-network:
    driver: bridge
